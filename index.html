<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Robin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: linear-gradient(to bottom, #1a0a1a 0%, #0d0202 100%); cursor: none; }
        canvas { display: block; }
        .cursor {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 150, 150, 0.6);
            border-radius: 50%;
            position: fixed; pointer-events: none;
            z-index: 1000; transition: transform 0.15s;
            mix-blend-mode: screen;
        }
        .cursor.hover { transform: scale(2); background: rgba(255, 150, 150, 0.2); }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="garden"></canvas>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        let width, height, mouse = { x: 0, y: 0, vx: 0, vy: 0, lastX: 0, lastY: 0 };
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.vx = e.clientX - mouse.lastX;
            mouse.vy = e.clientY - mouse.lastY;
            mouse.lastX = e.clientX; mouse.lastY = e.clientY;
        });
        
        document.addEventListener('mousedown', () => cursor.classList.add('hover'));
        document.addEventListener('mouseup', () => cursor.classList.remove('hover'));

        class ShyFlower {
            constructor(x, y, delay) {
                this.x = x; this.y = y;
                this.currentX = x + (Math.random() - 0.5) * 200;
                this.currentY = height + 50;
                this.size = 0; this.targetSize = 16 + Math.random() * 12;
                this.petals = 5 + Math.floor(Math.random() * 3);
                this.hue = Math.random() * 50 + 320;
                this.angle = Math.random() * Math.PI * 2;
                this.sway = Math.random() * 0.015;
                this.delay = delay;
                this.born = false;
                this.shyness = 0;
                this.love = 0;
                this.stemHeight = 60 + Math.random() * 80;
            }
            
            update() {
                if (time < this.delay) return;
                this.born = true;
                
                this.currentX += (this.x - this.currentX) * 0.04;
                this.currentY += (this.y - this.currentY) * 0.04;
                this.size += (this.targetSize - this.size) * 0.03;
                this.angle += this.sway;
                
                const dx = mouse.x - this.currentX;
                const dy = mouse.y - (this.currentY - this.stemHeight);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Shy behavior - hide when mouse is close, then peek
                if (dist < 120) {
                    this.shyness = Math.min(this.shyness + 0.1, 1);
                    this.love += 0.02;
                } else {
                    this.shyness *= 0.95;
                    this.love *= 0.98;
                }
                
                if (Math.random() < 0.005) this.shyness = 0.3;
            }
            
            draw(ctx) {
                if (!this.born) return;
                
                const stemX = this.currentX + Math.sin(time * 0.3 + this.x * 0.01) * 3;
                const headX = stemX;
                const headY = this.currentY - this.stemHeight;
                
                // Stem
                ctx.strokeStyle = `hsl(120, 30%, ${30 + this.love * 20}%)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.currentX, this.currentY);
                ctx.quadraticCurveTo(
                    this.currentX + (Math.random() - 0.5) * 10, 
                    this.currentY - this.stemHeight * 0.5,
                    stemX, headY
                );
                ctx.stroke();
                
                // Leaves
                ctx.fillStyle = `hsl(120, 35%, ${35 + this.love * 15}%)`;
                const leafY = this.currentY - this.stemHeight * 0.4;
                ctx.beginPath();
                ctx.ellipse(this.currentX - 12, leafY, 10, 5, -0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.currentX + 12, leafY + 8, 10, 5, 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.save();
                ctx.translate(headX, headY);
                
                // Shy tilt - look away from mouse
                const dx = mouse.x - headX;
                const tilt = Math.max(-0.5, Math.min(0.5, -dx * 0.002)) * this.shyness;
                ctx.rotate(this.angle + tilt);
                
                // Blush intensity
                const blush = this.shyness * 0.6 + this.love * 0.4;
                
                // Petals
                for (let i = 0; i < this.petals; i++) {
                    const a = (Math.PI * 2 * i) / this.petals;
                    ctx.save();
                    ctx.rotate(a);
                    
                    const petalSize = this.size * (1 - this.shyness * 0.2);
                    const grad = ctx.createRadialGradient(0, -petalSize * 0.5, 0, 0, 0, petalSize);
                    grad.addColorStop(0, `hsl(${this.hue}, 90%, ${75 + this.love * 10}%)`);
                    grad.addColorStop(0.5, `hsl(${this.hue}, 85%, ${60 + this.love * 10}%)`);
                    grad.addColorStop(1, `hsl(${this.hue}, 80%, 45%)`);
                    
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(0, -petalSize * 0.6, petalSize * 0.35, petalSize * 0.75, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                
                // Center
                ctx.fillStyle = `hsl(${45 + this.love * 20}, 90%, ${60 + this.love * 20}%)`;
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.28, 0, Math.PI * 2);
                ctx.fill();
                
                // Cute face
                if (this.size > 8) {
                    ctx.fillStyle = '#2a2a2a';
                    
                    // Eyes - look at mouse when not too shy, look away when shy
                    const eyeOffset = this.shyness * 3;
                    const lookX = (dx / width) * 4 * (1 - this.shyness);
                    const lookY = ((mouse.y - headY) / height) * 3 * (1 - this.shyness);
                    
                    // Left eye
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.12 + lookX - eyeOffset, -this.size * 0.04 + lookY, this.size * 0.07, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Right eye
                    ctx.beginPath();
                    ctx.arc(this.size * 0.12 + lookX - eyeOffset, -this.size * 0.04 + lookY, this.size * 0.07, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Shine
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.1 + lookX - eyeOffset, -this.size * 0.06 + lookY, this.size * 0.025, 0, Math.PI * 2);
                    ctx.arc(this.size * 0.14 + lookX - eyeOffset, -this.size * 0.06 + lookY, this.size * 0.025, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Mouth - small smile when calm, wavy when shy, big when loved
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    
                    if (this.love > 0.5) {
                        // Happy smile
                        ctx.arc(0, this.size * 0.02, this.size * 0.12, 0.3, Math.PI - 0.3);
                    } else if (this.shyness > 0.3) {
                        // Nervous wavy mouth
                        ctx.moveTo(-this.size * 0.1, this.size * 0.05);
                        ctx.quadraticCurveTo(-this.size * 0.05, this.size * 0.08, 0, this.size * 0.05);
                        ctx.quadraticCurveTo(this.size * 0.05, this.size * 0.02, this.size * 0.1, this.size * 0.05);
                    } else {
                        // Gentle smile
                        ctx.arc(0, this.size * 0.02, this.size * 0.08, 0.2, Math.PI - 0.2);
                    }
                    ctx.stroke();
                    
                    // Blush
                    ctx.fillStyle = `rgba(255, 100, 120, ${blush * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.18, this.size * 0.02, this.size * 0.06, 0, Math.PI * 2);
                    ctx.arc(this.size * 0.18, this.size * 0.02, this.size * 0.06, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Hearts when loved
                    if (this.love > 0.8 && Math.random() < 0.05) {
                        ctx.fillStyle = '#ff6b9d';
                        ctx.save();
                        ctx.translate(this.size * 0.3, -this.size * 0.3);
                        ctx.scale(0.3, 0.3);
                        ctx.beginPath();
                        ctx.moveTo(0, 3);
                        ctx.bezierCurveTo(-5, -2, -5, -6, 0, -4);
                        ctx.bezierCurveTo(5, -6, 5, -2, 0, 3);
                        ctx.fill();
                        ctx.restore();
                    }
                }
                
                ctx.restore();
            }
        }

        class FloatingHeart {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -1.5 - Math.random();
                this.size = 6 + Math.random() * 10;
                this.life = 1;
                this.hue = Math.random() * 40 + 320;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.life -= 0.008;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 85%, 70%)`;
                ctx.translate(this.x, this.y);
                ctx.scale(this.size/10, this.size/10);
                ctx.beginPath();
                ctx.moveTo(0, 3);
                ctx.bezierCurveTo(-5, -2, -5, -6, 0, -4);
                ctx.bezierCurveTo(5, -6, 5, -2, 0, 3);
                ctx.fill();
                ctx.restore();
            }
        }

        class Sparkle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.life = Math.random();
                this.decay = Math.random() * 0.015 + 0.005;
            }
            
            update() {
                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${Math.random() * 60 + 300}, 80%, 80%)`;
                ctx.translate(this.x, this.y);
                ctx.rotate(time * 3);
                ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                ctx.restore();
            }
        }

        const flowers = [];
        const hearts = [];
        const sparkles = Array.from({ length: 40 }, () => new Sparkle());

        function getLetterPoints(letter, offsetX, offsetY, scale) {
            const points = [];
            const step = 14;
            
            if (letter === 'R') {
                for (let y = 0; y < 90; y += step) points.push({x: 0, y: y});
                for (let x = 0; x < 35; x += step) points.push({x: x, y: 0});
                for (let x = 35; x >= 0; x -= step/2) points.push({x: x, y: 35});
                for (let y = 35; y < 90; y += step) points.push({x: 18 + (y-35)*0.35, y});
            } else if (letter === 'O') {
                for (let a = 0; a < Math.PI * 2; a += 0.5) {
                    points.push({x: 28 + Math.cos(a) * 28, y: 45 + Math.sin(a) * 40});
                }
            } else if (letter === 'B') {
                for (let y = 0; y < 90; y += step) points.push({x: 0, y: y});
                for (let x = 0; x < 30; x += step) points.push({x: x, y: 0});
                for (let x = 30; x >= 0; x -= step/2) points.push({x: x, y: 40});
                for (let x = 0; x < 28; x += step) points.push({x: x, y: 42});
                for (let x = 28; x >= 0; x -= step/2) points.push({x: x, y: 88});
            } else if (letter === 'I') {
                for (let y = 0; y < 90; y += step) points.push({x: 0, y: y});
            } else if (letter === 'N') {
                for (let y = 0; y < 90; y += step) points.push({x: 0, y: y});
                for (let y = 0; y < 90; y += step) points.push({x: 8 + y * 0.38, y});
                for (let y = 0; y < 90; y += step) points.push({x: 45, y: y});
            }
            
            return points.map(p => ({
                x: offsetX + p.x * scale,
                y: offsetY + p.y * scale
            }));
        }

        const letters = ['R', 'O', 'B', 'I', 'N'];
        const letterWidth = [45, 60, 45, 15, 50];
        const gap = 50;
        const scale = 1.4;
        
        let currentX = 0;
        const totalWidth = letterWidth.reduce((a, b) => a + b, 0) * scale + gap * 4;
        const startX = (width - totalWidth) / 2;
        const startY = height/2 - 60;

        letters.forEach((letter, li) => {
            const points = getLetterPoints(letter, startX + currentX, startY, scale);
            points.forEach((p, i) => {
                flowers.push(new ShyFlower(p.x, p.y, li * 0.5 + i * 0.02));
            });
            currentX += (letterWidth[li] * scale) + gap;
        });

        document.addEventListener('click', (e) => {
            for (let i = 0; i < 3; i++) {
                hearts.push(new FloatingHeart(e.clientX, e.clientY));
            }
            flowers.forEach(f => {
                const dx = e.clientX - f.x;
                const dy = e.clientY - f.y;
                if (Math.sqrt(dx*dx + dy*dy) < 150) {
                    f.love = 1;
                    f.shyness = 0;
                }
            });
        });

        function animate() {
            time += 0.016;
            
            ctx.fillStyle = 'rgba(26, 10, 26, 0.06)';
            ctx.fillRect(0, 0, width, height);
            
            sparkles.forEach(s => {
                s.update();
                s.draw(ctx);
            });
            
            flowers.forEach(f => {
                f.update();
                f.draw(ctx);
            });
            
            for (let i = hearts.length - 1; i >= 0; i--) {
                hearts[i].update();
                hearts[i].draw(ctx);
                if (hearts[i].life <= 0) hearts.splice(i, 1);
            }
            
            mouse.vx *= 0.92;
            mouse.vy *= 0.92;
            
            requestAnimationFrame(imate);
        }
        
        animate();
    </script>
</body>
</html>
