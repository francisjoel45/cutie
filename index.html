<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0a; cursor: none; }
        canvas { display: block; }
        .cursor {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 100, 100, 0.6);
            border-radius: 50%;
            position: fixed; pointer-events: none;
            z-index: 1000; transition: transform 0.15s;
            mix-blend-mode: screen;
        }
        .cursor.hover { transform: scale(2); background: rgba(255, 100, 100, 0.2); }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="garden"></canvas>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        let width, height, mouse = { x: 0, y: 0, vx: 0, vy: 0, lastX: 0, lastY: 0 };
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.vx = e.clientX - mouse.lastX;
            mouse.vy = e.clientY - mouse.lastY;
            mouse.lastX = e.clientX; mouse.lastY = e.clientY;
        });
        
        document.addEventListener('mousedown', () => cursor.classList.add('hover'));
        document.addEventListener('mouseup', () => cursor.classList.remove('hover'));

        class CuteFlower {
            constructor(x, y, delay) {
                this.x = x; this.y = y;
                this.currentX = width/2; this.currentY = height + 50;
                this.size = 0; this.targetSize = 12 + Math.random() * 10;
                this.petals = 5 + Math.floor(Math.random() * 3);
                this.hue = Math.random() * 40 + 340;
                this.angle = Math.random() * Math.PI * 2;
                this.sway = Math.random() * 0.02;
                this.delay = delay;
                this.born = false;
                this.face = { blink: 0, happy: 0 };
            }
            
            update() {
                if (time < this.delay) return;
                this.born = true;
                
                this.currentX += (this.x - this.currentX) * 0.06;
                this.currentY += (this.y - this.currentY) * 0.06;
                this.size += (this.targetSize - this.size) * 0.04;
                this.angle += this.sway;
                
                const dx = mouse.x - this.currentX;
                const dy = mouse.y - this.currentY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 60) {
                    this.face.happy = Math.min(this.face.happy + 0.1, 1);
                    this.targetSize = 18 + Math.random() * 8;
                } else {
                    this.face.happy *= 0.95;
                }
                
                if (Math.random() < 0.008) this.face.blink = 6;
                if (this.face.blink > 0) this.face.blink--;
            }
            
            draw(ctx) {
                if (!this.born) return;
                
                const x = this.currentX;
                const y = this.currentY;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.angle);
                
                for (let i = 0; i < this.petals; i++) {
                    const a = (Math.PI * 2 * i) / this.petals;
                    ctx.save();
                    ctx.rotate(a);
                    
                    const grad = ctx.createRadialGradient(0, -this.size * 0.5, 0, 0, 0, this.size);
                    grad.addColorStop(0, `hsl(${this.hue}, 90%, 75%)`);
                    grad.addColorStop(0.6, `hsl(${this.hue}, 85%, 60%)`);
                    grad.addColorStop(1, `hsl(${this.hue}, 80%, 45%)`);
                    
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(0, -this.size * 0.6, this.size * 0.35, this.size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.size > 6) {
                    ctx.fillStyle = '#333';
                    if (this.face.blink === 0) {
                        ctx.beginPath();
                        ctx.arc(-this.size * 0.1, -this.size * 0.06, this.size * 0.06, 0, Math.PI * 2);
                        ctx.arc(this.size * 0.1, -this.size * 0.06, this.size * 0.06, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(-this.size * 0.08, -this.size * 0.08, this.size * 0.02, 0, Math.PI * 2);
                        ctx.arc(this.size * 0.12, -this.size * 0.08, this.size * 0.02, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(-this.size * 0.16, -this.size * 0.06);
                        ctx.lineTo(-this.size * 0.04, -this.size * 0.06);
                        ctx.moveTo(this.size * 0.04, -this.size * 0.06);
                        ctx.lineTo(this.size * 0.16, -this.size * 0.06);
                        ctx.stroke();
                    }
                    
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1.5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    if (this.face.happy > 0.3) {
                        ctx.arc(0, this.size * 0.04, this.size * 0.12, 0.2, Math.PI - 0.2);
                    } else {
                        ctx.arc(0, this.size * 0.08, this.size * 0.08, 0.1, Math.PI - 0.1);
                    }
                    ctx.stroke();
                    
                    ctx.fillStyle = `rgba(255, 100, 100, ${this.face.happy * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.15, 0, this.size * 0.05, 0, Math.PI * 2);
                    ctx.arc(this.size * 0.15, 0, this.size * 0.05, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        class FloatingHeart {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -2 - Math.random() * 2;
                this.size = 8 + Math.random() * 12;
                this.life = 1;
                this.hue = Math.random() * 30 + 340;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.01;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 90%, 65%)`;
                ctx.translate(this.x, this.y);
                ctx.scale(this.size/10, this.size/10);
                ctx.beginPath();
                ctx.moveTo(0, 3);
                ctx.bezierCurveTo(-5, -2, -5, -6, 0, -4);
                ctx.bezierCurveTo(5, -6, 5, -2, 0, 3);
                ctx.fill();
                ctx.restore();
            }
        }

        const flowers = [];
        const hearts = [];

        function getLetterPoints(letter, offsetX, offsetY, scale) {
            const points = [];
            const step = 15;
            
            if (letter === 'R') {
                for (let y = 0; y < 100; y += step) points.push({x: 0, y: y});
                for (let x = 0; x < 40; x += step) points.push({x: x, y: 0});
                for (let x = 40; x >= 0; x -= step/2) points.push({x: x, y: 40});
                for (let y = 40; y < 100; y += step) points.push({x: 20 + (y-40)*0.4, y});
            } else if (letter === 'O') {
                for (let a = 0; a < Math.PI * 2; a += 0.5) {
                    points.push({x: 30 + Math.cos(a) * 30, y: 50 + Math.sin(a) * 45});
                }
            } else if (letter === 'B') {
                for (let y = 0; y < 100; y += step) points.push({x: 0, y: y});
                for (let x = 0; x < 35; x += step) points.push({x: x, y: 0});
                for (let x = 35; x >= 0; x -= step/2) points.push({x: x, y: 45});
                for (let x = 0; x < 30; x += step) points.push({x: x, y: 50});
                for (let x = 30; x >= 0; x -= step/2) points.push({x: x, y: 95});
            } else if (letter === 'I') {
                for (let y = 0; y < 100; y += step) points.push({x: 0, y: y});
            } else if (letter === 'N') {
                for (let y = 0; y < 100; y += step) points.push({x: 0, y: y});
                for (let y = 0; y < 100; y += step) points.push({x: 10 + y * 0.4, y});
                for (let y = 0; y < 100; y += step) points.push({x: 50, y: y});
            }
            
            return points.map(p => ({
                x: offsetX + p.x * scale,
                y: offsetY + p.y * scale
            }));
        }

        const letters = ['R', 'O', 'B', 'I', 'N'];
        const spacing = [0, 70, 140, 190, 220];
        const scale = 1.2;
        const startX = width/2 - 150;
        const startY = height/2 - 60;

        letters.forEach((letter, li) => {
            const points = getLetterPoints(letter, startX + spacing[li] * scale, startY, scale);
            points.forEach((p, i) => {
                flowers.push(new CuteFlower(p.x, p.y, li * 0.3 + i * 0.02));
            });
        });

        document.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                hearts.push(new FloatingHeart(e.clientX, e.clientY));
            }
            flowers.forEach(f => {
                const dx = e.clientX - f.x;
                const dy = e.clientY - f.y;
                if (Math.sqrt(dx*dx + dy*dy) < 100) f.face.happy = 1;
            });
        });

        function animate() {
            time += 0.016;
            
            ctx.fillStyle = 'rgba(10, 10, 10, 0.08)';
            ctx.fillRect(0, 0, width, height);
            
            flowers.forEach(f => {
                f.update();
                f.draw(ctx);
            });
            
            for (let i = hearts.length - 1; i >= 0; i--) {
                hearts[i].update();
                hearts[i].draw(ctx);
                if (hearts[i].life <= 0) hearts.splice(i, 1);
            }
            
            mouse.vx *= 0.92;
            mouse.vy *= 0.92;
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
