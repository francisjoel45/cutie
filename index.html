<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Robin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0a; cursor: none; }
        canvas { display: block; }
        .cursor {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 100, 100, 0.6);
            border-radius: 50%;
            position: fixed; pointer-events: none;
            z-index: 1000; transition: transform 0.15s;
            mix-blend-mode: screen;
        }
        .cursor.hover { transform: scale(2); background: rgba(255, 100, 100, 0.2); }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="garden"></canvas>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        let width, height, mouse = { x: 0, y: 0, vx: 0, vy: 0, lastX: 0, lastY: 0 };
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.vx = e.clientX - mouse.lastX;
            mouse.vy = e.clientY - mouse.lastY;
            mouse.lastX = e.clientX; mouse.lastY = e.lastY;
        });
        
        document.addEventListener('mousedown', () => cursor.classList.add('hover'));
        document.addEventListener('mouseup', () => cursor.classList.remove('hover'));

        class CuteFlower {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.size = 0; this.targetSize = 15 + Math.random() * 25;
                this.petals = 5 + Math.floor(Math.random() * 4);
                this.color = this.pickColor();
                this.angle = Math.random() * Math.PI * 2;
                this.sway = Math.random() * 0.02;
                this.stemHeight = 50 + Math.random() * 100;
                this.stemCurve = (Math.random() - 0.5) * 30;
                this.bloomSpeed = 0.02 + Math.random() * 0.02;
                this.face = { blink: 0, happy: 0 };
            }
            
            pickColor() {
                const palettes = [
                    { h: 350, s: 90, l: 65 }, // Red
                    { h: 25, s: 95, l: 70 },  // Orange
                    { h: 45, s: 95, l: 70 },  // Yellow
                    { h: 280, s: 80, l: 75 }, // Purple
                    { h: 320, s: 85, l: 75 }, // Pink
                    { h: 180, s: 70, l: 70 }  // Cyan
                ];
                return palettes[Math.floor(Math.random() * palettes.length)];
            }
            
            update() {
                this.size += (this.targetSize - this.size) * this.bloomSpeed;
                this.angle += this.sway;
                
                // React to mouse
                const dx = mouse.x - this.x;
                const dy = mouse.y - (this.y - this.stemHeight);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    this.face.happy = Math.min(this.face.happy + 0.1, 1);
                    this.targetSize = 25 + Math.random() * 20;
                } else {
                    this.face.happy *= 0.95;
                }
                
                // Blink
                if (Math.random() < 0.01) this.face.blink = 10;
                if (this.face.blink > 0) this.face.blink--;
            }
            
            draw(ctx) {
                const stemX = this.x + Math.sin(time * 0.5 + this.x * 0.01) * 5 + mouse.vx * 0.1;
                
                // Stem
                ctx.strokeStyle = '#4a7c59';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(
                    this.x + this.stemCurve, this.y - this.stemHeight * 0.5,
                    stemX, this.y - this.stemHeight
                );
                ctx.stroke();
                
                // Leaves
                ctx.fillStyle = '#5a8c69';
                const leafY = this.y - this.stemHeight * 0.4;
                ctx.beginPath();
                ctx.ellipse(this.x - 15, leafY, 12, 6, -0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + 15, leafY + 10, 12, 6, 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Flower head
                const fx = stemX;
                const fy = this.y - this.stemHeight;
                
                ctx.save();
                ctx.translate(fx, fy);
                ctx.rotate(this.angle);
                
                // Petals
                for (let i = 0; i < this.petals; i++) {
                    const angle = (Math.PI * 2 * i) / this.petals;
                    ctx.save();
                    ctx.rotate(angle);
                    
                    const grad = ctx.createRadialGradient(0, -this.size * 0.5, 0, 0, 0, this.size);
                    grad.addColorStop(0, `hsl(${this.color.h}, ${this.color.s}%, ${this.color.l + 20}%)`);
                    grad.addColorStop(0.5, `hsl(${this.color.h}, ${this.color.s}%, ${this.color.l}%)`);
                    grad.addColorStop(1, `hsl(${this.color.h}, ${this.color.s}%, ${this.color.l - 10}%)`);
                    
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(0, -this.size * 0.6, this.size * 0.4, this.size * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.restore();
                }
                
                // Center
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.35, 0, Math.PI * 2);
                ctx.fill();
                
                // Cute face
                if (this.size > 10) {
                    ctx.fillStyle = '#333';
                    // Eyes
                    if (this.face.blink === 0) {
                        ctx.beginPath();
                        ctx.arc(-this.size * 0.12, -this.size * 0.05, this.size * 0.08, 0, Math.PI * 2);
                        ctx.arc(this.size * 0.12, -this.size * 0.05, this.size * 0.08, 0, Math.PI * 2);
                        ctx.fill();
                        // Shine
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(-this.size * 0.1, -this.size * 0.08, this.size * 0.03, 0, Math.PI * 2);
                        ctx.arc(this.size * 0.14, -this.size * 0.08, this.size * 0.03, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(-this.size * 0.18, -this.size * 0.05);
                        ctx.lineTo(-this.size * 0.06, -this.size * 0.05);
                        ctx.moveTo(this.size * 0.06, -this.size * 0.05);
                        ctx.lineTo(this.size * 0.18, -this.size * 0.05);
                        ctx.stroke();
                    }
                    
                    // Smile
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    if (this.face.happy > 0.5) {
                        ctx.arc(0, this.size * 0.05, this.size * 0.15, 0.2, Math.PI - 0.2);
                    } else {
                        ctx.arc(0, this.size * 0.1, this.size * 0.1, 0.1, Math.PI - 0.1);
                    }
                    ctx.stroke();
                    
                    // Blush
                    ctx.fillStyle = `rgba(255, 100, 100, ${this.face.happy * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(-this.size * 0.2, this.size * 0.05, this.size * 0.08, 0, Math.PI * 2);
                    ctx.arc(this.size * 0.2, this.size * 0.05, this.size * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        class FloatingHeart {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -2 - Math.random() * 2;
                this.size = 10 + Math.random() * 15;
                this.life = 1;
                this.color = `hsl(${Math.random() * 60 + 330}, 90%, 70%)`;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.life -= 0.015;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.moveTo(0, this.size * 0.3);
                ctx.bezierCurveTo(-this.size * 0.5, -this.size * 0.2, -this.size * 0.5, -this.size * 0.6, 0, -this.size * 0.3);
                ctx.bezierCurveTo(this.size * 0.5, -this.size * 0.6, this.size * 0.5, -this.size * 0.2, 0, this.size * 0.3);
                ctx.fill();
                ctx.restore();
            }
        }

        class Sparkle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3;
                this.life = Math.random();
                this.decay = Math.random() * 0.02 + 0.01;
            }
            
            update() {
                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = '#fff';
                ctx.translate(this.x, this.y);
                ctx.rotate(time * 2);
                ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                ctx.restore();
            }
        }

        // Create garden
        const flowers = [];
        const hearts = [];
        const sparkles = Array.from({ length: 30 }, () => new Sparkle());
        
        function plantFlower(x, y) {
            flowers.push(new CuteFlower(x, y));
        }

        // Initial garden
        for (let i = 0; i < 12; i++) {
            plantFlower(
                width * 0.2 + Math.random() * width * 0.6,
                height * 0.6 + Math.random() * height * 0.3
            );
        }

        // Click to plant
        document.addEventListener('click', (e) => {
            plantFlower(e.clientX, e.clientY);
            for (let i = 0; i < 3; i++) {
                hearts.push(new FloatingHeart(e.clientX, e.clientY));
            }
        });

        // Animation
        function animate() {
            time += 0.016;
            
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Sparkles
            sparkles.forEach(s => {
                s.update();
                s.draw(ctx);
            });
            
            // Flowers
            flowers.forEach(f => {
                f.update();
                f.draw(ctx);
            });
            
            // Hearts
            for (let i = hearts.length - 1; i >= 0; i--) {
                hearts[i].update();
                hearts[i].draw(ctx);
                if (hearts[i].life <= 0) hearts.splice(i, 1);
            }
            
            mouse.vx *= 0.9;
            mouse.vy *= 0.9;
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
